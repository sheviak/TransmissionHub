name: pr-validation

on:
  pull_request:
    branches:
      - master
      - 'release/*'

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  wip-gate:
    name: WIP Gate
    runs-on: ubuntu-latest
    outputs:
      is_wip: ${{ steps.check.outputs.is_wip }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - id: check
        name: Check latest commit message
        shell: bash
        run: |
          subject="$(git log -1 --pretty=%s)"
          echo "Latest commit subject: $subject"

          if [[ "$subject" =~ ^[Ww][Ii][Pp]([[:space:]:_-]|$) ]]; then
            echo "is_wip=true" >> "$GITHUB_OUTPUT"
            echo "::error::Head commit starts with WIP. Push a new non-WIP commit to run validation."
            exit 1
          fi

          echo "is_wip=false" >> "$GITHUB_OUTPUT"

  format:
    name: Format Check
    runs-on: ubuntu-latest
    needs: wip-gate
    if: ${{ needs.wip-gate.outputs.is_wip == 'false' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore TransmissionHub.sln

      - name: Check formatting
        run: dotnet format TransmissionHub.sln --verify-no-changes --no-restore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: wip-gate
    if: ${{ needs.wip-gate.outputs.is_wip == 'false' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore TransmissionHub.sln

      - name: Build
        run: dotnet build TransmissionHub.sln -c Release --no-restore

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: wip-gate
    if: ${{ needs.wip-gate.outputs.is_wip == 'false' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore TransmissionHub.sln

      - name: Build
        run: dotnet build TransmissionHub.sln -c Release --no-restore

      - name: Test
        run: dotnet test TransmissionHub.sln -c Release --no-build --verbosity normal
