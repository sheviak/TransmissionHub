name: publish-transmissionhub-client

on:
  push:
    tags:
      - 'client-v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/TransmissionHub.Client/TransmissionHub.Client.csproj

      - name: Pack
        run: dotnet pack src/TransmissionHub.Client/TransmissionHub.Client.csproj -c Release -o ./artifacts

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
